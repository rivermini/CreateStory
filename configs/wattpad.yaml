site_name: Wattpad
base_url: https://www.wattpad.com

mirror_domains:
  - www.wattpad.com

domains:
  - www.wattpad.com
  - wattpad.com

story_url_pattern: "^https?://(?:www\\.)?wattpad\\.com/story/"

api_base: "https://www.wattpad.com/api/v3/stories"

rate_limit: 3.0

selectors:
  novel_title: "h1.story-title"
  chapter_list: ".chapter-list a, .table-of-contents a[href*='/chapter/'], .story-parts li a"
  chapter_body: ".story-content p, .xaclass p, main p"
  next_chapter: "a.next-part-link, .story-nav a.next, footer a[href*='/chapter/']"
  cover_image: ".cover img, .story-cover"
  author: ".author-name a, .contributor-avatar"

promo_patterns:
  - "Share this story"
  - "Vote"
  - "Report Story"
  - "Add to library"

spider_settings:
  DOWNLOAD_DELAY: 3.0
  AUTOTHROTTLE_ENABLED: true
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
