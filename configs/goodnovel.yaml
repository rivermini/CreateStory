site_name: GoodNovel
base_url: https://www.goodnovel.com

mirror_domains:
  - www.goodnovel.com

domains:
  - www.goodnovel.com
  - goodnovel.com

# Book pages look like /book/<Title-Slug>_<bookId> (bookId is ~11 digits).
story_url_pattern: "^https?://(?:www\\.)?goodnovel\\.com/book/[^/]+_\\d+"

rate_limit: 0.5

# GoodNovel is crawled through its JSON API (api-akm.goodnovel.com), not by
# scraping the SPA HTML, so these selectors are unused — kept for config parity.
selectors:
  novel_title: "h1"
  chapter_list: "a[href*='/book/']"
  chapter_body: ".chapter-content p"
  next_chapter: "a[rel='next']"
  cover_image: "meta[property='og:image']"
  author: "meta[name='author']"

promo_patterns:
  - "GoodNovel"
  - "Continue reading on"

spider_settings:
  DOWNLOAD_DELAY: 0.5
  AUTOTHROTTLE_ENABLED: true
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/136.0.0.0 Safari/537.36"
