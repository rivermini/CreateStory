# Shared log-rotation policy: cap each container's json-file logs so a chatty or
# runaway service can't fill the host disk over weeks of uptime. Applied to every
# service via `logging: *default-logging`.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  postgres:
    image: postgres:18
    container_name: create-story-postgres
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    environment:
      TZ: Asia/Bangkok
      PGTZ: Asia/Bangkok
      POSTGRES_DB: create_story
      POSTGRES_USER: create_story
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    volumes:
      - postgres_data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - database
      - database_host
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U create_story -d create_story"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # On-demand setup tool: `task database:provision` runs this with `--rm` before
  # supported start/update workflows. Keeping it behind a profile prevents an
  # exited setup container from being retained as part of the runtime stack.
  database_provisioner:
    image: postgres:18
    profiles: ["tools"]
    restart: "no"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      PGHOST: postgres
      PGPORT: "5432"
      PGUSER: create_story
      PGDATABASE: create_story
    secrets:
      - postgres_password
      - gateway_database_password
      - crawler_database_password
      - voices_database_password
      - drive_sync_database_password
      - auto_audio_database_password
    volumes:
      - ./scripts/provision_databases.sh:/opt/create-story/provision_databases.sh:ro
    command:
      - sh
      - -c
      - sed 's/\r$//' /opt/create-story/provision_databases.sh > /tmp/provision_databases.sh && sh /tmp/provision_databases.sh
    networks:
      - database
    depends_on:
      postgres:
        condition: service_healthy

  fastapi_gateway:
    image: services-fastapi-gateway:latest
    build:
      context: ./FastAPIServer
      dockerfile: Dockerfile
    container_name: create-story-fastapi-gateway
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    command: sh -c "alembic upgrade head && python main.py"
    environment:
      TZ: Asia/Bangkok
      # Enables the admin-only Dev Cleanup endpoints (POST /api/dev/clear-data
      # here, plus each worker's POST /api/dev/reset-state). Set DEV_MODE=false
      # in the environment to disable.
      DEV_MODE: ${DEV_MODE:-false}
      # "production" hard-disables the dev factory-reset routes (regardless of
      # DEV_MODE) and enables strict security headers (see api/middleware.py).
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL_FILE: /run/secrets/gateway_database_url
      JWT_SECRET_KEY_FILE: /run/secrets/jwt_secret_key
      INTERNAL_SERVICE_TOKEN_FILE: /run/secrets/internal_service_token
      # Browser CORS allowlist. Only localhost (Vite dev) is needed: in deployed
      # environments the SPA calls the API same-origin via the nginx /api proxy,
      # so no public domain belongs here. Domain changes need NO edit to this.
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      DOWNLOAD_TICKET_TTL_SECONDS: ${DOWNLOAD_TICKET_TTL_SECONDS:-3600}
      DOWNLOAD_PREPARE_TIMEOUT_SECONDS: ${DOWNLOAD_PREPARE_TIMEOUT_SECONDS:-1800}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES:-67108864}
      SERVICE_URLS_NovelCrawler: http://novel_crawler:8002
      SERVICE_URLS_BedReadVoices: http://bedread_voices:8001
      SERVICE_URLS_AutoAudio: http://auto_audio:8004
      SERVICE_URLS_BedReadDriveSync: http://bedread_drive_sync:8003
      SERVICE_URLS: '{"FastAPIServer":"http://fastapi_gateway:8000","NovelCrawler":"http://novel_crawler:8002","BedReadVoices":"http://bedread_voices:8001","AutoAudio":"http://auto_audio:8004","BedReadDriveSync":"http://bedread_drive_sync:8003"}'
    secrets:
      - gateway_database_url
      - jwt_secret_key
      - internal_service_token
    ports:
      - "127.0.0.1:8000:8000"
    networks:
      - edge
      - services
      - database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  bedread_voices:
    image: services-bedread-voices:latest
    build:
      context: ./BedReadVoices
      dockerfile: Dockerfile
    container_name: create-story-bedread-voices
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # TTS (Kokoro) is the only CPU-heavy service; Auto Mode drives it.
          # IMPORTANT: this value must be <= the CPUs the Docker Desktop VM is
          # given (Settings > Resources > CPUs / .wslconfig 'processors'), or the
          # daemon REFUSES to start the container. Default 6 is safe on an 8-CPU
          # VM; raise VOICES_CPUS in .env (e.g. 10 on a 12-thread box) after
          # confirming the VM has that many CPUs. Cap, not reservation.
          cpus: "${VOICES_CPUS:-6.0}"
          # Generous ceiling: idle ~900 MiB (TTS models loaded); leaves room for
          # audio synthesis + the queued-job window. Bump if a large auto-mode
          # batch ever OOMs (auto mode drives this service).
          memory: ${VOICES_MEMORY:-4g}
    command: sh -c "alembic upgrade head && python main.py"
    environment:
      TZ: Asia/Bangkok
      # Enable admin-only POST /api/dev/reset-state for Dev Cleanup.
      DEV_MODE: ${DEV_MODE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL_FILE: /run/secrets/voices_database_url
      INTERNAL_SERVICE_TOKEN_FILE: /run/secrets/internal_service_token
      SERVICE_URLS_BedReadDriveSync: http://bedread_drive_sync:8003
      # Global TTS admission cap (jobs in queued+processing across all users).
      # BedReadService now submits chapters in a window sized to the free slots,
      # so a story with more chapters than this no longer loses its overflow —
      # this is a soft buffer raised above the default 100 so large stories queue
      # with less waiting. Each queued job holds its chapter text in memory, so
      # keep it bounded.
      MAX_QUEUED_JOBS_GLOBAL: ${MAX_QUEUED_JOBS_GLOBAL:-300}
      # --- TTS throughput tuning ---
      # Single-worker TTS by design: one chapter synthesizes at a time and that
      # worker gets the service's whole CPU budget. The UI "TTS Concurrency"
      # setting is retired; these pins override any persisted value.
      KOKORO_CONCURRENCY: "1"
      KOKORO_MAX_CONCURRENCY: "1"
      # ONNX intra-op threads for the single worker = the full VOICES_CPUS
      # budget (integer; keep equal to VOICES_CPUS in .env).
      KOKORO_INTRA_OP_THREADS: ${KOKORO_INTRA_OP_THREADS:-6}
      OMP_NUM_THREADS: ${KOKORO_INTRA_OP_THREADS:-6}
      ORT_NUM_THREADS: ${KOKORO_INTRA_OP_THREADS:-6}
    secrets:
      - voices_database_url
      - internal_service_token
    volumes:
      # Kokoro model files are located inside the repo by default:
      # ./BedReadVoices/api/models (override KOKORO_MODELS_DIR in .env if using a custom cache).
      # Mount the two model FILES individually (not the whole dir) into api/models
      # so the bind mount does not hide the Python package there (db_models.py,
      # __init__.py) — the app reads api/models/kokoro-v1.0.onnx + voices-v1.0.bin.
      - ${KOKORO_MODELS_DIR:-./BedReadVoices/api/models}/kokoro-v1.0.onnx:/app/api/models/kokoro-v1.0.onnx:ro
      - ${KOKORO_MODELS_DIR:-./BedReadVoices/api/models}/voices-v1.0.bin:/app/api/models/voices-v1.0.bin:ro
      - bedread_voices_output:/app/output
    networks:
      - services
      - database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/api', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  novel_crawler:
    image: services-novel-crawler:latest
    build:
      context: ./NovelCrawler
      dockerfile: Dockerfile
    container_name: create-story-novel-crawler
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          # Cap the process table so a crash-looping Chromium can't exhaust host
          # PIDs and take down other services. Idle ~100 MiB.
          pids: 512
          memory: 2g
    pids_limit: 512
    command: sh -c "alembic upgrade head && python main.py"
    environment:
      TZ: Asia/Bangkok
      # Enable admin-only POST /api/dev/reset-state for Dev Cleanup.
      DEV_MODE: ${DEV_MODE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL_FILE: /run/secrets/crawler_database_url
      INTERNAL_SERVICE_TOKEN_FILE: /run/secrets/internal_service_token
      NOVEL_CRAWLER_COOKIE_ENCRYPTION_KEY_FILE: /run/secrets/cookie_encryption_key
      CHROME_BIN: /usr/bin/chromium
      FLARESOLVERR_URL: http://flaresolverr:8191/v1
      INKITT_BATCH_MAX_DISCOVER_WORKERS: ${INKITT_BATCH_MAX_DISCOVER_WORKERS:-2}
      INKITT_BATCH_MAX_CRAWL_WORKERS: ${INKITT_BATCH_MAX_CRAWL_WORKERS:-4}
      INKITT_DISCOVER_RETRY_TIMES: ${INKITT_DISCOVER_RETRY_TIMES:-6}
      INKITT_DISCOVER_RETRY_BASE_SECONDS: ${INKITT_DISCOVER_RETRY_BASE_SECONDS:-15}
      INKITT_DISCOVER_RETRY_MAX_SECONDS: ${INKITT_DISCOVER_RETRY_MAX_SECONDS:-120}
      # Globally pace starts while allowing a bounded number of responses in flight.
      INKITT_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS: ${INKITT_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS:-1.0}
      INKITT_MAX_IN_FLIGHT_REQUESTS: ${INKITT_MAX_IN_FLIGHT_REQUESTS:-2}
      INKITT_RATE_LIMIT_BASE_COOLDOWN_SECONDS: ${INKITT_RATE_LIMIT_BASE_COOLDOWN_SECONDS:-60}
      INKITT_RATE_LIMIT_MAX_COOLDOWN_SECONDS: ${INKITT_RATE_LIMIT_MAX_COOLDOWN_SECONDS:-900}
      INKITT_RATE_LIMIT_MAX_EVENTS: ${INKITT_RATE_LIMIT_MAX_EVENTS:-8}
      INKITT_RATE_LIMIT_RECOVERY_SUCCESSES: ${INKITT_RATE_LIMIT_RECOVERY_SUCCESSES:-250}
      INKITT_ARCHIVE_PREPARE_DELAY_SECONDS: ${INKITT_ARCHIVE_PREPARE_DELAY_SECONDS:-120}
      INKITT_ARCHIVE_COMPRESSION_LEVEL: ${INKITT_ARCHIVE_COMPRESSION_LEVEL:-1}
      INKITT_RENDERED_FALLBACK: ${INKITT_RENDERED_FALLBACK:-1}
      INKITT_RENDERED_FALLBACK_SUSPICIOUS_WORDS: ${INKITT_RENDERED_FALLBACK_SUSPICIOUS_WORDS:-800}
      # NovelHall genre batches scrape genre HTML through the NovelHall spider
      # (Cloudflare handled by FlareSolverr); the pacing/archive knobs mirror Inkitt.
      NOVELHALL_BATCH_MAX_DISCOVER_WORKERS: ${NOVELHALL_BATCH_MAX_DISCOVER_WORKERS:-2}
      NOVELHALL_BATCH_MAX_CRAWL_WORKERS: ${NOVELHALL_BATCH_MAX_CRAWL_WORKERS:-6}
      NOVELHALL_DISCOVER_RETRY_TIMES: ${NOVELHALL_DISCOVER_RETRY_TIMES:-6}
      NOVELHALL_DISCOVER_RETRY_BASE_SECONDS: ${NOVELHALL_DISCOVER_RETRY_BASE_SECONDS:-15}
      NOVELHALL_DISCOVER_RETRY_MAX_SECONDS: ${NOVELHALL_DISCOVER_RETRY_MAX_SECONDS:-120}
      NOVELHALL_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS: ${NOVELHALL_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS:-0.1}
      NOVELHALL_MAX_IN_FLIGHT_REQUESTS: ${NOVELHALL_MAX_IN_FLIGHT_REQUESTS:-8}
      NOVELHALL_RATE_LIMIT_BASE_COOLDOWN_SECONDS: ${NOVELHALL_RATE_LIMIT_BASE_COOLDOWN_SECONDS:-60}
      NOVELHALL_RATE_LIMIT_MAX_COOLDOWN_SECONDS: ${NOVELHALL_RATE_LIMIT_MAX_COOLDOWN_SECONDS:-900}
      NOVELHALL_RATE_LIMIT_MAX_EVENTS: ${NOVELHALL_RATE_LIMIT_MAX_EVENTS:-8}
      NOVELHALL_RATE_LIMIT_RECOVERY_SUCCESSES: ${NOVELHALL_RATE_LIMIT_RECOVERY_SUCCESSES:-250}
      NOVELHALL_ARCHIVE_PREPARE_DELAY_SECONDS: ${NOVELHALL_ARCHIVE_PREPARE_DELAY_SECONDS:-120}
      NOVELHALL_ARCHIVE_COMPRESSION_LEVEL: ${NOVELHALL_ARCHIVE_COMPRESSION_LEVEL:-1}
      # ReadNovelMtl discovery batches scrape the Latest listing + 4 ranking pages
      # through the ReadNovelMtl spider (Cloudflare handled by FlareSolverr); the
      # pacing/archive knobs mirror NovelHall.
      READNOVELMTL_BATCH_MAX_DISCOVER_WORKERS: ${READNOVELMTL_BATCH_MAX_DISCOVER_WORKERS:-2}
      READNOVELMTL_BATCH_MAX_CRAWL_WORKERS: ${READNOVELMTL_BATCH_MAX_CRAWL_WORKERS:-6}
      READNOVELMTL_DISCOVER_RETRY_TIMES: ${READNOVELMTL_DISCOVER_RETRY_TIMES:-6}
      READNOVELMTL_DISCOVER_RETRY_BASE_SECONDS: ${READNOVELMTL_DISCOVER_RETRY_BASE_SECONDS:-15}
      READNOVELMTL_DISCOVER_RETRY_MAX_SECONDS: ${READNOVELMTL_DISCOVER_RETRY_MAX_SECONDS:-120}
      READNOVELMTL_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS: ${READNOVELMTL_GLOBAL_MIN_REQUEST_INTERVAL_SECONDS:-0.1}
      READNOVELMTL_MAX_IN_FLIGHT_REQUESTS: ${READNOVELMTL_MAX_IN_FLIGHT_REQUESTS:-8}
      # Optional cf_clearance warmer, default OFF (chunked runs + cooldown handle the IP throttle).
      READNOVELMTL_COOKIE_WARM_INTERVAL_SECONDS: ${READNOVELMTL_COOKIE_WARM_INTERVAL_SECONDS:-0}
      READNOVELMTL_RATE_LIMIT_BASE_COOLDOWN_SECONDS: ${READNOVELMTL_RATE_LIMIT_BASE_COOLDOWN_SECONDS:-60}
      READNOVELMTL_RATE_LIMIT_MAX_COOLDOWN_SECONDS: ${READNOVELMTL_RATE_LIMIT_MAX_COOLDOWN_SECONDS:-900}
      READNOVELMTL_RATE_LIMIT_MAX_EVENTS: ${READNOVELMTL_RATE_LIMIT_MAX_EVENTS:-8}
      READNOVELMTL_RATE_LIMIT_RECOVERY_SUCCESSES: ${READNOVELMTL_RATE_LIMIT_RECOVERY_SUCCESSES:-250}
      READNOVELMTL_ARCHIVE_PREPARE_DELAY_SECONDS: ${READNOVELMTL_ARCHIVE_PREPARE_DELAY_SECONDS:-120}
      READNOVELMTL_ARCHIVE_COMPRESSION_LEVEL: ${READNOVELMTL_ARCHIVE_COMPRESSION_LEVEL:-1}
      # Jobnib completed-story batches are checkpointed and intentionally bounded.
      JOBNIB_ALLOW_PARTIAL: "false"
      JOBNIB_MIN_CHAPTER_WORDS: ${JOBNIB_MIN_CHAPTER_WORDS:-100}
      JOBNIB_BATCH_MAX_ARCHIVE_PAGES: ${JOBNIB_BATCH_MAX_ARCHIVE_PAGES:-1}
      JOBNIB_BATCH_MAX_STORIES: ${JOBNIB_BATCH_MAX_STORIES:-10000}
      JOBNIB_DISCOVERY_INTERVAL_SECONDS: ${JOBNIB_DISCOVERY_INTERVAL_SECONDS:-1.5}
      JOBNIB_SLOW_STORY_WORKERS: ${JOBNIB_SLOW_STORY_WORKERS:-1}
      JOBNIB_SLOW_REQUEST_SLOTS: ${JOBNIB_SLOW_REQUEST_SLOTS:-2}
      JOBNIB_SLOW_REQUEST_INTERVAL_SECONDS: ${JOBNIB_SLOW_REQUEST_INTERVAL_SECONDS:-1.5}
      JOBNIB_FAST_STORY_WORKERS: ${JOBNIB_FAST_STORY_WORKERS:-2}
      JOBNIB_FAST_REQUEST_SLOTS: ${JOBNIB_FAST_REQUEST_SLOTS:-4}
      JOBNIB_FAST_REQUEST_INTERVAL_SECONDS: ${JOBNIB_FAST_REQUEST_INTERVAL_SECONDS:-0.75}
      JOBNIB_ARCHIVE_PREPARE_DELAY_SECONDS: ${JOBNIB_ARCHIVE_PREPARE_DELAY_SECONDS:-120}
      JOBNIB_ARCHIVE_COMPRESSION_LEVEL: ${JOBNIB_ARCHIVE_COMPRESSION_LEVEL:-1}
      JOBNIB_USE_COOKIES: "true"
      JOBNIB_HEADLESS: ${JOBNIB_HEADLESS:-true}
      JOBNIB_CHROME_PROFILE: /app/output/jobnib_browser_profile
    secrets:
      - crawler_database_url
      - internal_service_token
      - cookie_encryption_key
    volumes:
      - novel_crawler_output:/app/output
    networks:
      - services
      - database
    depends_on:
      postgres:
        condition: service_healthy
      flaresolverr:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8002/api', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  flaresolverr:
    # Pinned to the current release (tag + immutable digest) so a surprise
    # upstream :latest push can't change crawl behavior between rebuilds.
    image: ghcr.io/flaresolverr/flaresolverr:v3.5.0@sha256:139dfee1c6f89249c8d665d1333a42e8ec74ec0a86bc6bb1c8461e10d3a66a47
    container_name: create-story-flaresolverr
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.5"
          # Runs a headless Chromium (idle ~160 MiB); cap memory growth and the
          # process table (fork-storm protection).
          pids: 512
          memory: 1536m
    pids_limit: 512
    environment:
      TZ: Asia/Bangkok
      LOG_LEVEL: info
    networks:
      - services
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8191/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  bedread_drive_sync:
    image: services-bedread-drive-sync:latest
    build:
      context: ./BedReadDriveSync
      dockerfile: Dockerfile
    container_name: create-story-bedread-drive-sync
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          # Bounded queue and nested work protect the host during 200-story runs.
          pids: 256
          memory: 1536m
    pids_limit: 256
    command: sh -c "alembic upgrade head && python main.py"
    environment:
      TZ: Asia/Bangkok
      # Enable admin-only POST /api/dev/reset-state for Dev Cleanup.
      DEV_MODE: ${DEV_MODE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL_FILE: /run/secrets/drive_sync_database_url
      INTERNAL_SERVICE_TOKEN_FILE: /run/secrets/internal_service_token
      DRIVE_SYNC_JOB_WORKERS: ${DRIVE_SYNC_JOB_WORKERS:-2}
      DRIVE_SYNC_CHAPTER_PREFETCH_WORKERS: ${DRIVE_SYNC_CHAPTER_PREFETCH_WORKERS:-4}
      DRIVE_SYNC_CHAPTER_WINDOW_SIZE: ${DRIVE_SYNC_CHAPTER_WINDOW_SIZE:-8}
      DRIVE_SYNC_DRIVE_CONCURRENCY: ${DRIVE_SYNC_DRIVE_CONCURRENCY:-6}
      DRIVE_SYNC_METADATA_WORKERS: ${DRIVE_SYNC_METADATA_WORKERS:-8}
      DRIVE_SYNC_METADATA_DOWNLOAD_CONCURRENCY: ${DRIVE_SYNC_METADATA_DOWNLOAD_CONCURRENCY:-8}
    secrets:
      - drive_sync_database_url
      - internal_service_token
    networks:
      - services
      - database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8003/api', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  auto_audio:
    image: services-auto-audio:latest
    build:
      context: ./AutoAudio
      dockerfile: Dockerfile
    container_name: create-story-auto-audio
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1g
    command: sh -c "alembic upgrade head && python -m uvicorn main:app --host 0.0.0.0 --port 8004"
    environment:
      TZ: Asia/Bangkok
      # Enable admin-only POST /api/dev/reset-state for Dev Cleanup.
      DEV_MODE: ${DEV_MODE:-false}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL_FILE: /run/secrets/auto_audio_database_url
      INTERNAL_SERVICE_TOKEN_FILE: /run/secrets/internal_service_token
      SERVICE_URLS: '{"BedReadVoices":"http://bedread_voices:8001","BedReadDriveSync":"http://bedread_drive_sync:8003"}'
    secrets:
      - auto_audio_database_url
      - internal_service_token
    volumes:
      - auto_audio_output:/app/output
    networks:
      - services
      - database
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8004/api', timeout=5)\""]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s

  frontend:
    # Pinned by digest so the served nginx can't silently change on rebuild.
    image: nginx:alpine@sha256:20316569d8f81a160065d7d2a5eeffc7ca97d79022462ee255fd23fa103a6b5c
    container_name: create-story-frontend
    restart: unless-stopped
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 256m
    ports:
      - "127.0.0.1:5173:80"
    volumes:
      - ./frontend-dist:/usr/share/nginx/html:ro
      - ./nginx-frontend.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - edge
    healthcheck:
      # 127.0.0.1 (not localhost): busybox wget resolves localhost to ::1 first,
      # but nginx listens on IPv4 0.0.0.0:80 only -> would be "connection refused".
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # One-shot migration/validation utility. The profile keeps it out of normal
  # stack starts; Task invokes it explicitly during the maintenance workflow.
  database_migrator:
    image: postgres:18
    profiles: ["migration"]
    restart: "no"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      MIGRATION_MODE: ${MIGRATION_MODE:-plan}
    secrets:
      - postgres_password
      - database_url
      - gateway_database_url
      - crawler_database_url
      - voices_database_url
      - drive_sync_database_url
      - auto_audio_database_url
    volumes:
      - ./scripts/migrate_databases.sh:/opt/create-story/migrate_databases.sh:ro
      - C:/ProgramData/CreateStory/backups:/backups
    command:
      - sh
      - -c
      - sed 's/\r$//' /opt/create-story/migrate_databases.sh > /tmp/migrate_databases.sh && sh /tmp/migrate_databases.sh
    networks:
      - database
    depends_on:
      postgres:
        condition: service_healthy

  # Disposable backup/restore utility. It is never part of the running stack;
  # Task invokes it with `docker compose run --rm`.
  database_backup:
    image: postgres:18
    profiles: ["tools"]
    restart: "no"
    logging: *default-logging
    security_opt:
      - no-new-privileges:true
    environment:
      BACKUP_MODE: ${BACKUP_MODE:-backup}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    secrets:
      - postgres_password
      - gateway_database_url
      - crawler_database_url
      - voices_database_url
      - drive_sync_database_url
      - auto_audio_database_url
    volumes:
      - ./scripts/backup_databases.sh:/opt/create-story/backup_databases.sh:ro
      - C:/ProgramData/CreateStory/backups:/backups
    command:
      - sh
      - -c
      - sed 's/\r$//' /opt/create-story/backup_databases.sh > /tmp/backup_databases.sh && sh /tmp/backup_databases.sh
    networks:
      - database
    depends_on:
      postgres:
        condition: service_healthy

