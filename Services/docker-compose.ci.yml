services:
  database_migrator:
    volumes:
      - migration_ci_backups:/backups

secrets:
  postgres_password:
    file: ./.ci-secrets/postgres_password
  database_url:
    file: ./.ci-secrets/database_url
  gateway_database_password:
    file: ./.ci-secrets/gateway_database_password
  gateway_database_url:
    file: ./.ci-secrets/gateway_database_url
  crawler_database_password:
    file: ./.ci-secrets/crawler_database_password
  crawler_database_url:
    file: ./.ci-secrets/crawler_database_url
  voices_database_password:
    file: ./.ci-secrets/voices_database_password
  voices_database_url:
    file: ./.ci-secrets/voices_database_url
  drive_sync_database_password:
    file: ./.ci-secrets/drive_sync_database_password
  drive_sync_database_url:
    file: ./.ci-secrets/drive_sync_database_url
  auto_audio_database_password:
    file: ./.ci-secrets/auto_audio_database_password
  auto_audio_database_url:
    file: ./.ci-secrets/auto_audio_database_url
  jwt_secret_key:
    file: ./.ci-secrets/jwt_secret_key
  internal_service_token:
    file: ./.ci-secrets/internal_service_token
  cookie_encryption_key:
    file: ./.ci-secrets/cookie_encryption_key

volumes:
  migration_ci_backups:
