site_name: NovelWorm
base_url: https://www.novelworm.com

mirror_domains:
  - www.novelworm.com

domains:
  - www.novelworm.com
  - novelworm.com

rate_limit: 0.25

selectors:
  novel_title: "h1.story-title, .story-header h1, .story-info h1"
  chapter_list: ".chapter-list a, .table-of-contents a, .chapters a, .chapter-item a, [class*='chapter'] a"
  chapter_body: ".chapter-content p, .reading-content p, .chapter-text p, .story-text p, [class*='content'] p"
  next_chapter: "a.next-chapter, a[class*='next'], .chapter-nav a:last-child, footer a[rel='next']"
  cover_image: ".story-cover img, .cover-image img, [class*='cover'] img"
  author: ".author-name a, .author a, [class*='author'] a"

promo_patterns:
  - "Share this story"
  - "Report"
  - "Add to library"

spider_settings:
  DOWNLOAD_DELAY: 0.0
  AUTOTHROTTLE_ENABLED: false
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
