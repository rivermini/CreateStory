site_name: ReadNovelMtl
base_url: https://readnovelmtl.com

mirror_domains:
  - readnovelmtl.com
  - www.readnovelmtl.com

domains:
  - readnovelmtl.com
  - www.readnovelmtl.com

# Story page:   https://readnovelmtl.com/novel/<slug>-<id>
# Chapter page: https://readnovelmtl.com/novel/<slug>-<id>/chapter/<chid>-chapter-<NNN>-<slug>
story_url_pattern: "^https?://(?:www\\.)?readnovelmtl\\.com/novel/[^/]+/?$"

rate_limit: 0.4

selectors:
  novel_title: "h1"
  chapter_list: "a[href*='/chapter/']"   # full catalogue on the story page
  chapter_body: "#content"
  next_chapter: "a[rel='next'], a[href*='/chapter/']"
  cover_image: "meta[property='og:image']"
  author: "a.text-body.text-decoration-none[href*='/author'], a.text-body.text-decoration-none"

promo_patterns:
  - "readnovelmtl.com"

spider_settings:
  DOWNLOAD_DELAY: 0.3
  CONCURRENT_REQUESTS_PER_DOMAIN: 1
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/149.0.0.0 Safari/537.36"
