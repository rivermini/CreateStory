site_name: Novellunar
base_url: https://novellunar.com

mirror_domains:
  - novellunar.com

domains:
  - novellunar.com
  - www.novellunar.com

rate_limit: 0.2
concurrency: 5

# Novellunar is a Next.js (App Router) site that server-renders chapter prose,
# so plain HTTP requests work — no Selenium / Cloudflare bypass is required.
# Chapter prose lives in:  article > div[style*="white-space:pre-wrap"]
# and is split into many <span> nodes with single "\n" paragraph breaks.
selectors:
  novel_title: "h1.text-2xl, h1.text-3xl, meta[property='og:title']"
  chapter_list: "a[href*='/chapter/']"
  chapter_body: "article div[style*='white-space:pre-wrap'], article"
  chapter_title: "main h1, article h1, h1"
  next_chapter: "a[href*='/chapter/']"
  cover_image: "meta[property='og:image']"
  author: "a[href*='/author/']"

promo_patterns:
  - "Continue reading"
  - "Read Free English"
  - "Quick read"

spider_settings:
  DOWNLOAD_DELAY: 0.0
  AUTOTHROTTLE_ENABLED: false
  CONCURRENT_REQUESTS_PER_DOMAIN: 5
  USER_AGENT: "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36"
