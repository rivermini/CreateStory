server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json application/xml+rss image/svg+xml;

    # --- Security headers ---
    # NOTE: nginx `add_header` does NOT inherit into a location that declares its
    # own add_header, so the full set is repeated in the /index.html location
    # below (and nosniff in the asset location). HSTS is intentionally omitted —
    # set it at the Cloudflare edge (this origin serves plain http behind the
    # tunnel). CSP connect-src must list the cross-origin API hosts the SPA calls.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.wattpad.com https://*.goodnovel.com https://*.inkitt.com https://*.scribblehub.com https://*.googleusercontent.com; font-src 'self' data:; connect-src 'self' http://localhost:8000; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # SPA entry - always revalidate so local rebuilds propagate to returning users
    location = /index.html {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header ETag "" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.wattpad.com https://*.goodnovel.com https://*.inkitt.com https://*.scribblehub.com https://*.googleusercontent.com; font-src 'self' data:; connect-src 'self' http://localhost:8000 ; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # Reverse-proxy the API to the gateway so the SPA and API share ONE origin.
    # Same-origin means no CORS/preflight, and a single Cloudflare Access login
    # cookie covers both the UI and the API — the gateway is never exposed on its
    # own public hostname. A variable + Docker's embedded resolver makes nginx
    # resolve the gateway at request time (survives startup ordering / restarts).
    location /api/ {
        resolver 127.0.0.11 valid=30s;
        set $cs_gateway http://fastapi_gateway:8000;
        proxy_pass $cs_gateway$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        # SSE (crawl progress) + streamed zip/audio downloads: stream, don't buffer.
        proxy_buffering off;
        client_max_body_size 64m;
    }

    # SPA routing - send all requests to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
