name: NovelCrawler CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    name: Security, migration, and tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: create_story_ci
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d create_story_ci"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@localhost:5432/create_story_ci
      INTERNAL_SERVICE_TOKEN: ci-internal-service-token

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Full-history secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block committed credential artifacts
        shell: bash
        run: |
          forbidden="$(
            git ls-files |
            grep -Ei '(^|/)\.env($|\.((development|production|local|test|staging)(\..*)?|.*local)$)|(^|/).*(cookies?|service-account|credentials).*\.(json|txt)$|(^|/).*(private[-_]?key|id_rsa|id_dsa|id_ecdsa|id_ed25519)(\..*)?$|(^|/).*\.(pem|p12|pfx)$' || true
          )"
          if [ -n "$forbidden" ]; then
            echo "Forbidden credential artifact(s) are tracked:"
            echo "$forbidden"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pip-audit

      - name: Compile import tree
        run: python -m compileall -q api

      - name: Run migrations
        run: alembic upgrade head

      - name: Startup import smoke
        run: |
          python - <<'PY'
          from api.main import app
          assert app.title
          PY

      - name: Pytest
        run: python -m pytest -q

      - name: Dependency audit
        run: pip-audit -r requirements.txt
