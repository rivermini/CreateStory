name: FE CI and Deploy

on:
  push:
    branches:
      - main
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "index.html"
      - ".github/workflows/deploy-cms-s3.yml"
  pull_request:
    paths:
      - "src/**"
      - "public/**"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "vitest.config.ts"
      - "index.html"
      - ".github/workflows/deploy-cms-s3.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fe-ci-deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Required frontend checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Full-history secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Block committed credential artifacts
        shell: bash
        run: |
          forbidden="$(
            git ls-files |
            grep -Ei '(^|/)\.env($|\.((development|production|local|test|staging)(\..*)?|.*local)$)|(^|/).*(cookies?|service-account|credentials).*\.(json|txt)$|(^|/).*(private[-_]?key|id_rsa|id_dsa|id_ecdsa|id_ed25519)(\..*)?$|(^|/).*\.(pem|p12|pfx)$' || true
          )"
          if [ -n "$forbidden" ]; then
            echo "Forbidden credential artifact(s) are tracked:"
            echo "$forbidden"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: TypeScript check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Dependency audit
        run: npm audit --audit-level=high

      - name: Production build
        run: npm run build

  deploy:
    name: Deploy FE to S3
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'

    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      S3_BUCKET: ${{ secrets.S3_BUCKET }}
      CLOUDFRONT_DISTRIBUTION_ID: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build CMS
        run: npm run build

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy static files to S3
        run: aws s3 sync dist s3://${{ env.S3_BUCKET }} --delete

      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id ${{ env.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
